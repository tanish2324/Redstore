
<!DOCTYPE html>
<html>
<head>
<title>Payment & Add to Cart</title>

<style>

body{
font-family: Arial;
background:#f4f4f4;
}

.container{
width:80%;
margin:auto;
}

.products{
display:flex;
gap:20px;
margin-top:30px;
}

.product{
background:white;
padding:20px;
border:1px solid #ddd;
text-align:center;
width:200px;
}

button{
background:gray;
color:white;
border:none;
padding:10px;
cursor:pointer;
}

table{
width:100%;
margin-top:40px;
border-collapse:collapse;
background:white;
}

th{
background:red;
color:white;
padding:10px;
}

td{
padding:10px;
text-align:center;
border-bottom:1px solid #ddd;
}

.total{
margin-top:20px;
font-size:20px;
text-align:right;
}

.pay{
margin-top:20px;
text-align:right;
}

.pay button{
background:green;
padding:12px 20px;
}

</style>

</head>

<body>

<div class="container">

<h1>Payment & Add to cart</h1>

<div class="products">

<div class="product">
<h3>Red T-shirt</h3>
<p>Price: $50</p>
<button onclick="addToCart('Red T Shirt',50)">Add To Cart</button>
</div>

<div class="product">
<h3> Black Shoes</h3>
<p>Price: $80</p>
<button onclick="addToCart(' Black Shoes',80)">Add To Cart</button>
</div>

<div class="product">
<h3>Black Pant</h3>
<p>Price: $120</p>
<button onclick="addToCart('Black Pant',120)">Add To Cart</button>
</div>
<div class="product">
<h3>Blue T-shirt</h3>
<p>Price: $70</p>
<button onclick="addToCart('Blue T-Shirt',70)">Add To Cart</button>
</div>

</div>

<h2>Cart</h2>

<table id="cartTable">

<tr>
<th>Product</th>
<th>Price</th>
<th>Quantity</th>
<th>Total</th>
<th>Remove</th>
</tr>

</table>

<div class="total">
Total Price: $<span id="totalPrice">0</span>
</div>

<div class="pay">
<button onclick="payNow()">Pay Now</button>
</div>

</div>

<script>

let cart = [];

function addToCart(name,price){

let item = cart.find(p=>p.name===name);

if(item){
item.qty++;
}else{
cart.push({name:name,price:price,qty:1});
}

displayCart();

}

function displayCart(){

let table = document.getElementById("cartTable");

table.innerHTML = `
<tr>
<th>Product</th>
<th>Price</th>
<th>Quantity</th>
<th>Total</th>
<th>Remove</th>
</tr>
`;

let total = 0;

cart.forEach((item,index)=>{

let subtotal = item.price * item.qty;

let row = table.insertRow();

row.insertCell(0).innerHTML = item.name;
row.insertCell(1).innerHTML = "$"+item.price;
row.insertCell(2).innerHTML = item.qty;
row.insertCell(3).innerHTML = "$"+subtotal;

row.insertCell(4).innerHTML =
`<button onclick="removeItem(${index})">Remove</button>`;

total += subtotal;

});

document.getElementById("totalPrice").innerText = total;

}

function removeItem(index){

cart.splice(index,1);

displayCart();

}

function payNow(){

let total = document.getElementById("totalPrice").innerText;

if(total == 0){
alert("Cart Empty");
return;
}

alert("Payment Successful! Total Paid: $" + total);

cart = [];
displayCart();

}

</script>

</body>
</html>
