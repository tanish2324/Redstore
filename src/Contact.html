<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<style>
body{
    font-family: Arial;
    background:#f4f4f4;
    margin:0;
}

.header{
    background:#333;
    color:white;
    text-align:center;
    padding:15px;
}

.container{
    width:40%;
    margin:40px auto;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

input, textarea{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:red;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:darkred;
}

a{
    display:block;
    text-align:center;
    margin-top:15px;
}
</style>

<script>
function sendMessage(){
    alert("Message Sent Successfully!");
}
</script>

</head>
<body>

<div class="header">
<h1>Contact Us</h1>
</div>

<div class="container">

<form onsubmit="sendMessage()">
<input type="text" placeholder="Enter Your Name" required>

<input type="email" placeholder="Enter Your Email" required>

<textarea rows="5" placeholder="Enter Your Message"></textarea>

<button type="submit">Send Message</button>

</form>

<a href="src/index.html">Back to Home</a>

</div>

</body>
</html>
